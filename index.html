<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="terminal">
    <div id="login-screen">
        <h2>SYSTEM LOGIN</h2>
        <p>IDENTITEIT VEREIST...</p>
        <input type="text" id="pass1" placeholder="Wachtwoord..." autocomplete="off">
        <button onclick="checkLogin()">ENTER</button>
    </div>

    <div id="dashboard" class="hidden">
        <h2>DIRECTORY: /ROOT</h2>
        <div class="folder" onclick="loadContent('content/missie_logs.html')">📁 /MISSIE_LOGS</div>
        <div class="folder" onclick="loadContent('content/persoonlijk.html')">📁 /PERSOONLIJK</div>
        <div class="folder" onclick="openKluis()">🔒 /GEHEIME_KLUIS</div>
    </div>

    <div id="content-viewer" class="hidden">
        <div id="content-area"></div>
        <button onclick="showDashboard()">TERUG NAAR ROOT</button>
    </div>

    <div id="kluis-screen" class="hidden">
        <h2>GEAUTOMATISEERDE KLUIS</h2>
        <p>VOER DE 4-CIJFERIGE CODE IN.</p>
        <input type="number" id="pass2" placeholder="Code...">
        <button onclick="checkKluis()">DECRYPTEER</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
