<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL ACCESS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="terminal">
    <div id="login-screen">
        <h2>SYSTEM LOGIN</h2>
        <p id="game-instructions">Druk op de knop wanneer de balk in de groene zone is. (4 keer)</p>
        <div id="minigame-container">
            <canvas id="minigameCanvas" width="300" height="300"></canvas>
        </div>
        <button id="loginButton">DUW</button>
    </div>

    <div id="dashboard" class="hidden">
        <h2>DIRECTORY: /ROOT</h2>
        <div class="folder" onclick="loadContent('content/fotos_blackie_menu.html')">/FOTOS_BLACKIE</div>
        <div class="folder" onclick="loadContent('content/persoonlijk.html')">/PERSOONLIJK</div>
        <div class="folder kluis-folder" onclick="openKluis()">/GEHEIME_KLUIS</div>
    </div>

    <div id="content-viewer" class="hidden">
        <div id="content-area"></div>
        <button id="backToRootButton">TERUG NAAR ROOT</button>
    </div>

    <div id="kluis-screen" class="hidden">
        <h2>GEAUTOMATISEERDE KLUIS</h2>
        <p>Voer de 4-cijferige code in.</p>
        <input type="text" id="pass2" placeholder="Code...">
        <button id="kluisButton">DECRYPTEER</button>
        <button onclick="showDashboard()" style="margin-top: 10px;">TERUG NAAR ROOT</button>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
